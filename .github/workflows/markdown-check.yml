name: Markdown Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  markdown-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check README exists
        run: test -f README.md

      - name: List markdown files
        run: find . -name "*.md"
        